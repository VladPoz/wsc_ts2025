<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pricing</title>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__contents">
                <section class="header__contents__elements">
                    <figure class="logo">
                        <img class="logo__img" src="./media-files/icons/bike-rack-perpendicular-right-svgrepo-com.svg" alt="Logo"> 
                        VelOrda
                    </figure>
                </section>
                <nav class="header__elements">
                    <ul>
                        <li>
                            <a class="header__link" href="./index.html">
                                <span class="header__link__line header__link__line-first"></span>
                                <span class="header__link__text">Home</span>
                                <span class="header__link__line"></span>
                            </a>
                        </li>
                        <li>
                            <a class="header__link" href="./bicycle.html">
                                <span class="header__link__text">Bicycle</span>
                                <span class="header__link__line"></span>
                            </a>
                        </li>
                        <li>
                            <a class="header__link" href="./pricing.html">
                                <span class="header__link__text">Pricing</span>
                                <span class="header__link__line"></span>
                            </a>
                        </li>
                        <li>
                            <a class="header__link" href="./FAQ.html">
                                <span class="header__link__text">FAQ</span>
                                <span class="header__link__line"></span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <div class="container">
            <section class="main__pricing">
                <div class="main__title">
                    <span></span>
                    <h2>Pricing Plan</h2>
                    <span></span>
                </div>
                <nav class="main__pricing-grid">
                    <div class="main__pricing__form">
                        <p>Hourly</p>
                        <h3>1$/1h</h3>
                        <p>Description</p>
                        <button class="btn">Start</button>
                    </div>
                    <div class="main__pricing__form main__pricing__form-main">
                        <p>Daily</p>
                        <h3>10$/1d</h3>
                        <p>Description</p>
                        <button class="btn">Start</button>
                    </div>
                    <div class="main__pricing__form">
                        <p>Monthly</p>
                        <h3>250$/1m</h3>
                        <p>Description</p>
                        <button class="btn">Start</button>
                    </div>
                </nav>
            </section>
        </div>
    </main>
</body>
</html>
